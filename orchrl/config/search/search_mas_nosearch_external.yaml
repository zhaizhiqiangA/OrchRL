defaults:
- ../ppo_trainer@models.model_0.ppo_trainer_config: eval
- ../ppo_trainer@models.model_1.ppo_trainer_config: eval
- ../ppo_trainer@models.model_2.ppo_trainer_config: eval
- _self_
workflow_type: external_mas
specialization: full
lora_rank: 0
lora_alpha: 16
resource:
  nnodes: 1
  n_gpus_per_node: 3
  trust_remote_code: true
env:
  name: search_env
  dataset: drmas_search
  benchmark: drmas_search_nosearch
  multi_modal: false
  batched_init: true
agent_policy_configs:
  agent_configs:
    agent_0:
      name: verifier
      policy_name: verifier_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.2
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
    agent_1:
      name: searcher
      policy_name: searcher_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
    agent_2:
      name: answerer
      policy_name: answerer_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.4
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0
base_models:
  policy_0:
    path: /data1/lll/models/Qwen3-0.6B
    name: verifier_model
  policy_1:
    path: /data1/lll/models/Qwen3-0.6B
    name: searcher_model
  policy_2:
    path: /data1/lll/models/Qwen3-0.6B
    name: answerer_model
training:
  rollout_source: mate
  device: cuda
  total_training_steps: 100
  project_name: orchrl
  experiment_name: search_mas_nosearch_external
  logger:
  - console
  model_checkpoints_dir: checkpoints/search_mas_nosearch_external
  ray_wait_register_center_timeout: 300
  train_batch_size: 2
  train_sample_num: 4
  validate_sample_num: 1
  sample_temperature: 0.6
  val_freq: 50
  max_prompt_length: 4096
  max_response_length: 4096
  lora_rank: ${lora_rank}
  lora_alpha: ${lora_alpha}
  mate:
    roles: [verifier, searcher, answerer]
    role_policy_mapping:
      verifier: verifier_model
      searcher: searcher_model
      answerer: answerer_model
    batch_size: ${training.train_batch_size}
    n_samples_per_prompt: ${training.train_sample_num}
    rollout_mode: parallel
    tree:
      k_branches: 3
      max_concurrent_branches: 2
    max_concurrent_episodes: 2
    timeout: 120
    backend_timeout: 120
    credit_assignment: all_turns
    mas_work_dir: examples/mas_app/search
    mas_command_template: python scripts/run_search_mas.py --config {config_path} --question {prompt}
    config_template_path: examples/mas_app/search/configs/search_mas_real_nosearch.yaml
    prompt_loader:
      source_type: parquet
      path: /data1/zzh/mas_app/search/data/drmas_search_mas/test_sampled.parquet
      prompt_keys: [question, prompt, query, problem, input]
      expected_keys: [expected_answer, answer, expected_answers, gold_answer, golden_answers, target, label]
    reward:
      provider: orchrl.reward.search.external_mas_reward:compute_reward
models:
  model_0:
    path: ${base_models.policy_0.path}
    name: ${base_models.policy_0.name}
    ppo_trainer_config:
      filter_method: uid
      filter_ratio: 0.0
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.policy_0.path}
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: 1
        trainer:
          n_gpus_per_node: 1
          n_training_gpus_per_node: 1
  model_1:
    path: ${base_models.policy_1.path}
    name: ${base_models.policy_1.name}
    ppo_trainer_config:
      filter_method: uid
      filter_ratio: 0.0
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.policy_1.path}
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: 1
        trainer:
          n_gpus_per_node: 1
          n_training_gpus_per_node: 1
  model_2:
    path: ${base_models.policy_2.path}
    name: ${base_models.policy_2.name}
    ppo_trainer_config:
      filter_method: uid
      filter_ratio: 0.0
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.policy_2.path}
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: 1
        trainer:
          n_gpus_per_node: 1
          n_training_gpus_per_node: 1
